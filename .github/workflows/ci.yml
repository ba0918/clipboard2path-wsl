name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release

      - name: Binary size
        run: |
          size=$(stat -c%s target/release/clipboard2path-wsl)
          echo "Binary size: ${size} bytes ($((size / 1024)) KB)"
          # Fail if binary exceeds 1MB
          if [ "$size" -gt 1048576 ]; then
            echo "::error::Binary size ${size} exceeds 1MB limit"
            exit 1
          fi
